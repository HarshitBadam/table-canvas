server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Preserve OAuth popup communication. DuckDB selects its compatible
    # single-threaded browser bundle when cross-origin isolation is unavailable.
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    # Keep authentication cookies and API calls same-origin in production.
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 50m;
    }

    # SPA client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed Vite assets — long-term immutable cache
    location /assets/ {
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # DuckDB filenames are not content-hashed, so they must be revalidated.
    location /duckdb/ {
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        types {
            application/wasm wasm;
            application/javascript js;
        }
    }
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Cross-origin isolation for DuckDB-WASM SharedArrayBuffer / multithreading.
    # COOP: same-origin is required for SharedArrayBuffer.
    # COEP: "credentialless" (not "require-corp") is intentionally chosen so that
    # any remaining cross-origin sub-resources (fonts, analytics, etc.) are not
    # blocked by a missing CORP header. "credentialless" still enables
    # crossOriginIsolated in Chromium, which is sufficient because all DuckDB WASM
    # and worker assets are served locally from /duckdb/ (see Task 4).
    add_header Cross-Origin-Opener-Policy  "same-origin"    always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    # Keep authentication cookies and API calls same-origin in production.
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 50m;
    }

    # SPA client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed Vite assets — long-term immutable cache
    location /assets/ {
        add_header Cross-Origin-Opener-Policy  "same-origin"    always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # DuckDB WASM/worker files — long-term cache, correct MIME
    location /duckdb/ {
        add_header Cross-Origin-Opener-Policy  "same-origin"    always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        types {
            application/wasm wasm;
            application/javascript js;
        }
    }
}

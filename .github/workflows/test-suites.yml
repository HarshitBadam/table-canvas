# =============================================================================
# Table Canvas - Categorized Test Suites
# =============================================================================
# Run specific test suites on demand or for detailed analysis.
# Useful for debugging specific areas without running full CI.
#
# Trigger manually via GitHub Actions UI with workflow_dispatch
# =============================================================================

name: Test Suites

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - engine
          - formula
          - persistence
          - suggestions
          - e2e

env:
  NODE_VERSION: '20'

jobs:
  # ===========================================================================
  # Engine Tests (Materialization, Dependency Graph)
  # ===========================================================================
  engine-tests:
    name: ⚙️ Engine Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'engine' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run engine tests
        run: npm run test:engine

  # ===========================================================================
  # Formula Tests (Parser, Evaluator)
  # ===========================================================================
  formula-tests:
    name: 📐 Formula Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'formula' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run formula tests
        run: npm run test:formula

  # ===========================================================================
  # Persistence Tests (IndexedDB, Sync Service)
  # ===========================================================================
  persistence-tests:
    name: 💾 Persistence Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'persistence' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run persistence tests
        run: npm run test:persistence

  # ===========================================================================
  # Suggestions Tests (Suggestion Engine, Classifiers)
  # ===========================================================================
  suggestions-tests:
    name: 💡 Suggestions Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'suggestions' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run suggestions tests
        run: npm run test:suggestions

  # ===========================================================================
  # E2E Tests (Playwright)
  # ===========================================================================
  e2e-tests:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'e2e' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
